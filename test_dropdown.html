<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试航司下拉框</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            padding: 20px;
        }
        .el-select-dropdown__list {
            list-style: none;
            padding: 6px 0;
            margin: 0;
            box-sizing: border-box;
        }
        .el-select-dropdown__item {
            padding: 0 20px;
            height: 34px;
            line-height: 34px;
            font-size: 14px;
            color: #606266;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #fff;
            border: 1px solid #ebeef5;
            margin: 2px 0;
            border-radius: 4px;
        }
        .el-select-dropdown__item:hover {
            background-color: #f5f7fa;
        }
    </style>
</head>
<body>
    <h1>测试航司下拉框显示</h1>
    <ul class="el-select-dropdown__list" id="dropdownList"></ul>

    <script>
        const AIRLINE_NAMES = {
            'CA': '中国国际航空', 'MU': '中国东方航空', 'CZ': '中国南方航空',
            'HU': '海南航空', 'FM': '上海航空', 'MF': '厦门航空',
            'SC': '山东航空', 'ZH': '深圳航空', '3U': '四川航空',
            'KY': '昆明航空', 'BK': '奥凯航空', 'CN': '大新华航空',
            'EU': '成都航空', 'G5': '华夏航空', 'GS': '天津航空',
            'HO': '吉祥航空', 'JD': '首都航空', 'JR': '幸福航空',
            'KN': '中国联合航空', 'NS': '河北航空', 'OQ': '重庆航空',
            'QW': '青岛航空', 'RY': '江西航空', 'TV': '西藏航空',
            'UQ': '乌鲁木齐航空', 'PN': '西部航空', '8L': '祥鹏航空',
            '9H': '长安航空', 'A6': '红土航空', 'DR': '桂林航空',
            'FU': '福州航空', 'GJ': '长龙航空', 'GX': '北部湾航空',
            'DZ': '东海航空', 'LT': '龙江航空', 'GY': '多彩贵州'
        };

        const airlines = [
            {code: 'CA', name: '中国国际航空'},
            {code: 'MU', name: '中国东方航空'},
            {code: 'CZ', name: '中国南方航空'},
            {code: 'KY', name: '昆明航空'},
            {code: 'NS', name: '河北航空'},
            {code: 'RY', name: '江西航空'},
            {code: 'DZ', name: '东海航空'},
        ];

        const list = document.getElementById('dropdownList');
        airlines.forEach(airline => {
            const name = AIRLINE_NAMES[airline.code] || airline.name || airline.code;
            const li = document.createElement('li');
            li.className = 'el-select-dropdown__item';
            li.dataset.value = airline.code;
            li.textContent = `${airline.code} - ${name}`;
            list.appendChild(li);
        });

        console.log("渲染完成,应该显示 'CA - 中国国际航空' 这样的格式");
    </script>
</body>
</html>
