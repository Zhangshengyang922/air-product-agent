<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航空公司产品智能体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            padding: 25px 30px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 13px;
        }

        /* 智能搜索区域 */
        .smart-search {
            padding: 30px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
        }

        .search-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #999;
        }

        .search-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .search-hints {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
            line-height: 1.8;
        }

        .search-hints span {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }

        /* 分类筛选区 */
        .filters-section {
            padding: 20px 30px;
            background: #fafbfc;
            border-bottom: 1px solid #e8e8e8;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-tag {
            padding: 8px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .filter-tag:hover {
            border-color: #4a90e2;
            color: #4a90e2;
        }

        .filter-tag.active {
            background: #4a90e2;
            border-color: #4a90e2;
            color: white;
        }

        /* 快捷航司 */
        .quick-airlines {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .airline-badge {
            padding: 6px 14px;
            background: #e8f4fd;
            border: 1px solid #b8d7f8;
            border-radius: 6px;
            font-size: 12px;
            color: #1976d2;
            cursor: pointer;
            transition: all 0.2s;
        }

        .airline-badge:hover {
            background: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }

        .airline-badge.active {
            background: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }

        /* 结果区域 */
        .results-section {
            padding: 30px;
            min-height: 400px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-count {
            font-size: 14px;
            color: #666;
        }

        .results-count span {
            color: #4a90e2;
            font-weight: bold;
            font-size: 18px;
        }

        .clear-btn {
            padding: 6px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        /* 产品卡片 - 简洁版 */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-card {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 18px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #4a90e2;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.15);
        }

        .product-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }

        .product-meta {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #666;
            flex-wrap: wrap;
        }

        .product-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-price {
            text-align: right;
        }

        .price-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 20px;
            font-weight: bold;
            color: #4a90e2;
        }

        .price-unit {
            font-size: 12px;
            color: #666;
        }

        .product-details {
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            display: none;
        }

        .product-details.show {
            display: block;
        }

        .detail-row {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        .detail-item {
            display: flex;
            gap: 6px;
        }

        .detail-label {
            color: #999;
            min-width: 70px;
        }

        .detail-value {
            color: #333;
            flex: 1;
        }

        .product-tags {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag.all { background: #e3f2fd; color: #1976d2; }
        .tag.gp { background: #e8f5e9; color: #388e3c; }
        .tag.bsp { background: #fff3e0; color: #f57c00; }
        .tag.b2b { background: #fce4ec; color: #c2185b; }
        .tag.multi { background: #f3e5f5; color: #7b1fa2; }
        .tag.default { background: #f5f5f5; color: #666; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 加载中 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90e2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 12px;
            }

            .product-main {
                flex-direction: column;
                gap: 10px;
            }

            .product-price {
                text-align: left;
            }

            .detail-row {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>✈️ 航空公司产品智能体</h1>
            <p>覆盖30家航空公司 · 883个产品 · 智能对话搜索</p>
        </div>

        <!-- 智能搜索 -->
        <div class="smart-search">
            <div class="search-title">
                <span>💬 智能对话搜索</span>
            </div>

            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="输入关键词搜索，如：海南航空贵宾室、Q舱经济舱、100元以内产品..."
                    onkeypress="if(event.key==='Enter') performSearch()"
                >
            </div>

            <button class="search-btn" onclick="performSearch()">开始搜索</button>

            <div class="search-hints">
                搜索示例：
                <span>海南航空</span>
                <span>贵宾室</span>
                <span>Q舱</span>
                <span>100-200元</span>
                <span>KMG319</span>
                <span>GP票证</span>
            </div>
        </div>

        <!-- 分类筛选 -->
        <div class="filters-section">
            <!-- 快捷航司 -->
            <div class="filter-group">
                <div class="filter-label">🏢 快速选择航司</div>
                <div class="quick-airlines" id="quickAirlines">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 票证类型 -->
            <div class="filter-group">
                <div class="filter-label">📋 票证类型</div>
                <div class="filter-tags" id="ticketTypeTags">
                    <span class="filter-tag active" data-type="">全部</span>
                    <span class="filter-tag" data-type="ALL">ALL</span>
                    <span class="filter-tag" data-type="GP">GP (集团客户)</span>
                    <span class="filter-tag" data-type="BSP">BSP (中性票)</span>
                    <span class="filter-tag" data-type="B2B">B2B (企业)</span>
                </div>
            </div>
        </div>

        <!-- 结果区域 -->
        <div class="results-section">
            <div class="results-header">
                <div class="results-count">
                    找到 <span id="resultsCount">0</span> 个产品
                </div>
                <button class="clear-btn" onclick="clearAll()">清除筛选</button>
            </div>

            <div id="resultsList" class="product-list">
                <div class="empty-state">
                    <div class="empty-icon">📦</div>
                    <p>输入关键词或选择分类开始搜索</p>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>搜索中...</p>
            </div>
        </div>
    </div>

    <script src="app_v3.js"></script>
</body>
</html>
