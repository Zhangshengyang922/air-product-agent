<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航空公司产品智能体</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>✈️ 航空公司产品智能体</h1>
            <p class="subtitle">简洁的产品查询工具</p>
        </header>

        <!-- 统计信息 -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-value" id="totalProducts">-</div>
                <div class="stat-label">总产品数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAirlines">-</div>
                <div class="stat-label">航司数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRoutes">-</div>
                <div class="stat-label">航线数量</div>
            </div>
        </div>

        <!-- 票证类型统计 -->
        <div class="ticket-types-section">
            <div class="ticket-type-card gp">
                <div class="ticket-type-label">GP</div>
                <div class="ticket-type-count" id="gpCount">-</div>
                <div class="ticket-type-desc">集团客户</div>
            </div>
            <div class="ticket-type-card bsp">
                <div class="ticket-type-label">BSP</div>
                <div class="ticket-type-count" id="bspCount">-</div>
                <div class="ticket-type-desc">中性票</div>
            </div>
            <div class="ticket-type-card b2b">
                <div class="ticket-type-label">B2B</div>
                <div class="ticket-type-count" id="b2bCount">-</div>
                <div class="ticket-type-desc">企业</div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="搜索产品、航线、航司..."
                    class="search-input"
                >
                <button onclick="searchProducts()" class="search-btn">🔍 搜索</button>
            </div>
            <div class="filter-section">
                <label class="filter-label">票证类型:</label>
                <select id="ticketTypeFilter" class="filter-select" onchange="filterProducts()">
                    <option value="ALL">全部</option>
                    <option value="GP">GP (集团客户)</option>
                    <option value="BSP">BSP (中性票)</option>
                    <option value="B2B">B2B (企业)</option>
                    <option value="MULTI">多种类型</option>
                </select>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('airlines')">🏢 航空公司</button>
            <button class="tab-btn" onclick="switchTab('products')">📦 产品列表</button>
            <button class="tab-btn" onclick="switchTab('search')">🔍 搜索结果</button>
        </div>

        <!-- 内容区域 -->
        <div class="content-section">
            <!-- 航空公司列表 -->
            <div id="airlinesTab" class="tab-content active">
                <div id="airlinesList" class="airlines-grid"></div>
            </div>

            <!-- 产品列表 -->
            <div id="productsTab" class="tab-content">
                <div id="productsList" class="products-container"></div>
            </div>

            <!-- 搜索结果 -->
            <div id="searchTab" class="tab-content">
                <div id="searchResults" class="products-container"></div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>

        <!-- 错误提示 -->
        <div id="error" class="error hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
