<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航空公司产品智能体</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #303133;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* 左侧航司列表 - Element UI Card 风格 */
        .sidebar {
            display: none;
        }

        /* Element UI 风格输入框 */
        .search-box {
            margin-bottom: 16px;
        }

        .el-input {
            position: relative;
            width: 100%;
            font-size: 14px;
        }

        .el-input__inner {
            width: 100%;
            height: 40px;
            line-height: 40px;
            padding: 0 15px;
            background-color: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            color: #606266;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .el-input__inner:hover {
            border-color: #c0c4cc;
        }

        .el-input__inner:focus {
            border-color: #409eff;
        }

        .el-input__inner::placeholder {
            color: #c0c4cc;
        }

        .airline-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Element UI 列表项风格 */
        .airline-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 1px solid transparent;
        }

        .airline-item:hover {
            background-color: #f5f7fa;
        }

        .airline-item.active {
            background-color: #ecf5ff;
            border-color: #b3d8ff;
            color: #409eff;
        }

        .airline-code {
            font-size: 14px;
            font-weight: 500;
            min-width: 48px;
            color: #606266;
        }

        .airline-item.active .airline-code {
            color: #409eff;
        }

        .airline-name {
            flex: 1;
            font-size: 14px;
            color: #606266;
            margin-left: 12px;
        }

        .airline-item.active .airline-name {
            color: #409eff;
        }

        /* 右侧内容区 */
        .main-content {
            width: 100%;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            padding: 20px;
            min-height: calc(100vh - 40px);
        }

        /* 筛选栏 - 使用select布局 */
        .filter-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ebeef5;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 14px;
            color: #606266;
            font-weight: 500;
        }

        .el-select {
            width: 100%;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #ebeef5;
        }

        .content-title {
            font-size: 18px;
            font-weight: 500;
            color: #303133;
        }

        .content-stats {
            font-size: 14px;
            color: #909399;
        }

        /* Element UI 筛选器区域 */
        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section-title {
            font-size: 14px;
            color: #606266;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Element UI Select 风格 */
        .el-select {
            display: inline-block;
            position: relative;
        }

        .el-select .el-input__inner {
            cursor: pointer;
            padding-right: 30px;
        }

        .el-select__caret {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0c4cc;
            font-size: 14px;
            transition: transform 0.3s;
            pointer-events: none;
        }

        .el-select:hover .el-select__caret {
            color: #909399;
        }

        /* Select 下拉框 */
        .el-select-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 2000;
            background-color: #fff;
            border: 1px solid #e4e7ed;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            max-height: 274px;
            display: none;
        }

        .el-select-dropdown.visible {
            display: block;
        }

        .el-select-dropdown__search {
            padding: 8px;
            border-bottom: 1px solid #ebeef5;
        }

        .el-select-dropdown__search input {
            width: 100%;
            height: 32px;
            line-height: 32px;
            padding: 0 15px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            color: #606266;
        }

        .el-select-dropdown__search input:focus {
            border-color: #409eff;
        }

        .el-select-dropdown__search input::placeholder {
            color: #c0c4cc;
        }

        .el-select-dropdown__list {
            list-style: none;
            margin: 0;
            padding: 6px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .el-select-dropdown__list::-webkit-scrollbar {
            width: 6px;
        }

        .el-select-dropdown__list::-webkit-scrollbar-thumb {
            background: #dcdfe6;
            border-radius: 3px;
        }

        .el-select-dropdown__list::-webkit-scrollbar-track {
            background: #f5f7fa;
        }

        .el-select-dropdown__item {
            padding: 0 20px;
            height: 34px;
            line-height: 34px;
            font-size: 14px;
            color: #606266;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .el-select-dropdown__item:hover {
            background-color: #f5f7fa;
        }

        .el-select-dropdown__item.selected {
            color: #409eff;
            font-weight: 700;
        }

        .el-select-dropdown__item.disabled {
            color: #c0c4cc;
            cursor: not-allowed;
        }

        .el-select-dropdown__empty {
            padding: 10px 0;
            margin: 0;
            text-align: center;
            color: #909399;
            font-size: 14px;
        }

        /* Element UI 标签风格 */
        .el-tag {
            display: inline-block;
            height: 32px;
            padding: 0 12px;
            line-height: 30px;
            font-size: 13px;
            color: #409eff;
            border: 1px solid #d9ecff;
            background-color: #ecf5ff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            user-select: none;
        }

        .el-tag:hover {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }

        .el-tag.active {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }

        .el-tag.el-tag--info {
            background-color: #f4f4f5;
            border-color: #e9e9eb;
            color: #909399;
        }

        .el-tag.el-tag--success {
            background-color: #f0f9eb;
            border-color: #e1f3d8;
            color: #67c23a;
        }

        .el-tag.el-tag--warning {
            background-color: #fdf6ec;
            border-color: #faecd8;
            color: #e6a23c;
        }

        .el-tag.el-tag--danger {
            background-color: #fef0f0;
            border-color: #fde2e2;
            color: #f56c6c;
        }

        /* Element UI 表格风格 */
        .el-table {
            width: 100%;
            font-size: 14px;
            color: #606266;
            border-collapse: collapse;
            border-spacing: 0;
        }

        .el-table th {
            background-color: #f5f7fa;
            color: #909399;
            font-weight: 500;
            text-align: left !important;
            padding: 4px 6px !important;
            border: 1px solid #ebeef5;
            font-size: 11px;
            height: 28px;
        }

        .el-table td {
            padding: 4px 6px !important;
            border: 1px solid #ebeef5;
            font-size: 11px;
            height: 32px;
            line-height: 1.3;
        }

        .el-table td,
        .el-table th {
            text-align: left;
        }

        .el-table tr {
            transition: background-color 0.25s ease;
        }

        .el-table tr:hover > td {
            background-color: #f5f7fa;
        }

        .el-table .el-table__expanded-cell {
            background-color: #fafafa;
        }

        .el-table .el-table__expand-icon {
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-block;
            width: 16px;
            height: 16px;
            color: #c0c4cc;
        }

        .el-table .el-table__expand-icon:hover {
            color: #409eff;
        }

        .el-table .expanded .el-table__expand-icon {
            transform: rotate(90deg);
        }

        /* 移除不需要的样式 */
        .airline-list,
        .airline-item,
        .airline-code,
        .airline-name,
        .filter-section,
        .filter-section-title,
        .filter-group {
            display: flex !important;
        }

        /* 展开行内容 */
        .expand-content {
            padding: 8px 12px;
            background-color: #fafafa;
        }

        .expand-content h4 {
            margin: 0 0 8px 0;
            color: #303133;
            font-size: 12px;
            font-weight: 500;
        }

        .expand-content table td {
            padding: 4px 8px !important;
            font-size: 11px;
        }

        .expand-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #ebeef5;
        }

        .expand-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .expand-section-title {
            font-size: 14px;
            font-weight: 500;
            color: #409eff;
            margin-bottom: 12px;
        }

        .expand-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.6;
        }

        .expand-label {
            width: 100px;
            color: #909399;
            flex-shrink: 0;
        }

        .expand-value {
            color: #606266;
            flex: 1;
            word-break: break-all;
        }

        /* 表格单元格 */
        .cell-price {
            font-size: 14px;
            font-weight: 500;
            color: #f56c6c;
        }

        .cell-rebate {
            color: #67c23a;
        }

        .cell-tag {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid;
        }

        .cell-tag--all {
            background-color: #ecf5ff;
            border-color: #d9ecff;
            color: #409eff;
        }

        .cell-tag--gp {
            background-color: #f0f9eb;
            border-color: #e1f3d8;
            color: #67c23a;
        }

        .cell-tag--bsp {
            background-color: #fdf6ec;
            border-color: #faecd8;
            color: #e6a23c;
        }

        .cell-tag--b2b {
            background-color: #fef0f0;
            border-color: #fde2e2;
            color: #f56c6c;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: #909399;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 8px;
            color: #606266;
        }

        .empty-state small {
            font-size: 14px;
            color: #c0c4cc;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 80px 0;
            color: #606266;
        }

        .el-loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            margin-bottom: 16px;
        }

        .el-loading-spinner svg {
            width: 40px;
            height: 40px;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .el-loading-spinner .path {
            stroke: #409eff;
            stroke-width: 3;
            stroke-linecap: round;
            fill: none;
            animation: dash 1.5s ease-in-out infinite;
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 150;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -35;
            }
            100% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -124;
            }
        }

        .hidden {
            display: none !important;
        }

        /* 通知动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .el-table {
                font-size: 12px;
            }

            .el-table th.el-table__cell,
            .el-table td.el-table__cell {
                padding: 4px 6px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主内容区 -->
        <div class="main-content" style="width: 100%;">
            <div class="content-header">
                <div class="content-title">全部产品</div>
                <div class="content-stats">
                    共 <span id="productsCount">0</span> 个产品
                    <button id="logoutBtn" onclick="handleLogout()" style="margin-left: 20px; padding: 6px 16px; background: #f56c6c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
                        🚪 登出
                    </button>
                </div>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <div class="filter-item">
                    <div class="filter-label">航空公司</div>
                    <div class="el-select el-select--filterable" id="airlineSelectWrapper">
                        <input type="text" class="el-input__inner" id="airlineSelectInput" placeholder="请选择航空公司" readonly>
                        <span class="el-select__caret">▼</span>
                        <div class="el-select-dropdown" id="airlineDropdown">
                            <div class="el-select-dropdown__search">
                                <input type="text" id="airlineSearchInput" placeholder="请输入关键字搜索">
                            </div>
                            <ul class="el-select-dropdown__list" id="airlineDropdownList"></ul>
                        </div>
                    </div>
                </div>
                <div class="filter-item">
                    <div class="filter-label">票证类型</div>
                    <div class="el-select">
                        <select id="ticketTypeSelect" class="el-input__inner">
                            <option value="">全部</option>
                            <option value="ALL">所有</option>
                            <option value="GP">GP</option>
                            <option value="BSP">BSP</option>
                            <option value="B2B">B2B</option>
                        </select>
                    </div>
                </div>
                <div class="filter-item">
                    <div class="filter-label">舱位等级</div>
                    <div class="el-select">
                        <select id="cabinClassSelect" class="el-input__inner">
                            <option value="">全部</option>
                            <option value="ECONOMY">经济舱</option>
                            <option value="BUSINESS">商务舱</option>
                            <option value="FIRST">头等舱</option>
                        </select>
                    </div>
                </div>
                <div class="filter-item">
                    <div class="filter-label">产品类型</div>
                    <div class="el-select">
                        <select id="productTypeSelect" class="el-input__inner">
                            <option value="">全部</option>
                            <option value="常规产品">常规</option>
                            <option value="贵宾室服务">贵宾室</option>
                            <option value="变更服务">变更</option>
                            <option value="伴手礼服务">伴手礼</option>
                        </select>
                    </div>
                </div>
                <div class="filter-item">
                    <div class="filter-label">Office号</div>
                    <div class="el-select">
                        <select id="officeSelect" class="el-input__inner">
                            <option value="">全部</option>
                            <option value="KMG319">KMG319</option>
                            <option value="CTU152">CTU152</option>
                            <option value="SZX146">SZX146</option>
                            <option value="KMG279">KMG279</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 产品表格 -->
            <div id="productsContainer" style="margin-top: 20px;">
                <div class="empty-state">
                    <div class="empty-icon">📦</div>
                    <p>正在加载产品数据...</p>
                </div>
            </div>

            <!-- 批量删除按钮 -->
            <div style="position: fixed; bottom: 30px; right: 30px; z-index: 1000;">
                <button id="batchDeleteButton" onclick="batchDeleteProducts()" class="el-button el-button--danger" style="padding: 12px 24px; font-size: 14px; box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1); display: none;">
                    删除选中 (0)
                </button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="el-loading-spinner">
                    <svg viewBox="0 0 50 50">
                        <circle class="path" cx="25" cy="25" r="20"></circle>
                    </svg>
                </div>
                <p>加载中...</p>
            </div>

            <div id="loading" class="loading hidden">
                <div class="el-loading-spinner">
                    <svg viewBox="0 0 50 50">
                        <circle class="path" cx="25" cy="25" r="20"></circle>
                    </svg>
                </div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== 立即检查登录状态(页面加载前) ====================
        (function() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                // 未登录,立即跳转到登录页
                window.location.href = '/login';
            }
        })();

        // ==================== 全局变量 ====================
        const API_BASE = '';

        const AIRLINE_NAMES = {
            'CA': '中国国际航空', 'MU': '中国东方航空', 'CZ': '中国南方航空',
            'HU': '海南航空', 'FM': '上海航空', 'MF': '厦门航空',
            'SC': '山东航空', 'ZH': '深圳航空', '3U': '四川航空',
            'KY': '昆明航空', 'BK': '奥凯航空', 'CN': '大新华航空',
            'EU': '成都航空', 'G5': '华夏航空', 'GS': '天津航空',
            'HO': '吉祥航空', 'JD': '首都航空', 'JR': '幸福航空',
            'KN': '中国联合航空', 'NS': '河北航空', 'OQ': '重庆航空',
            'QW': '青岛航空', 'RY': '江西航空', 'TV': '西藏航空',
            'UQ': '乌鲁木齐航空', 'PN': '西部航空', '8L': '祥鹏航空',
            '9H': '长安航空', 'A6': '红土航空', 'DR': '桂林航空',
            'FU': '福州航空', 'GJ': '长龙航空', 'GX': '北部湾航空',
            'DZ': '东海航空', 'LT': '龙江航空', 'GY': '多彩贵州'
        };

        // 航司简称映射(用于智能识别)
        const AIRLINE_ALIASES = {
            '东航': 'MU',
            '上航': 'FM',
            '南航': 'CZ',
            '国航': 'CA',
            '海航': 'HU',
            '川航': '3U',
            '厦航': 'MF',
            '山航': 'SC',
            '深航': 'ZH',
            '昆航': 'KY',
            '长龙': 'GJ',
            '祥鹏': '8L',
            '首都': 'JD',
            '幸福': 'JR',
            '长安': '9H',
            '天津': 'GS',
            '北部湾': 'GX',
            '东海': 'DZ',
            '龙江': 'LT',
            '西部': 'PN',
            '西藏': 'TV',
            '成都': 'EU',
            '华夏': 'G5',
            '江西': 'RY',
            '青岛': 'QW',
            '河北': 'NS',
            '重庆': 'OQ',
            '福州': 'FU',
            '乌鲁木齐': 'UQ',
            '联合': 'KN',
            '奥凯': 'BK',
            '吉祥': 'HO',
            '大新华': 'CN',
            '红土': 'A6',
            '桂林': 'DR',
            '多彩贵州': 'GY'
        };

        // 智能识别航司代码
        function detectAirlineCode(product) {
            const productName = product.product_name || '';
            const route = product.route || '';
            const office = product.office || '';

            // 方法1: 直接从airline字段获取
            if (product.airline) {
                return product.airline;
            }

            // 方法2: 从产品名称中查找航司二字码
            for (const code of Object.keys(AIRLINE_NAMES)) {
                if (productName.includes(code)) {
                    return code;
                }
            }

            // 方法3: 从产品名称中查找航司全称
            for (const [name, code] of Object.entries(AIRLINE_NAMES)) {
                if (productName.includes(name)) {
                    return code;
                }
            }

            // 方法4: 从产品名称中查找航司简称
            for (const [alias, code] of Object.entries(AIRLINE_ALIASES)) {
                if (productName.includes(alias)) {
                    return code;
                }
            }

            // 方法5: 从路线中查找航司全称或简称
            if (route) {
                for (const [name, code] of Object.entries(AIRLINE_NAMES)) {
                    if (route.includes(name)) {
                        return code;
                    }
                }
                for (const [alias, code] of Object.entries(AIRLINE_ALIASES)) {
                    if (route.includes(alias)) {
                        return code;
                    }
                }
            }

            // 方法6: 从Office字段中查找航司二字码
            if (office) {
                for (const code of Object.keys(AIRLINE_NAMES)) {
                    if (office.includes(code)) {
                        return code;
                    }
                }
            }

            // 未识别到航司
            return null;
        }

        // 舱位等级定义
        const CABIN_CLASSES = {
            'ECONOMY': ['Y', 'B', 'M', 'H', 'K', 'L', 'Q', 'T', 'X', 'U', 'E', 'W', 'S', 'N', 'R'], // 经济舱
            'BUSINESS': ['C', 'D', 'I', 'Z', 'J'], // 商务舱
            'FIRST': ['F', 'A', 'P'] // 头等舱

        // 判断舱位等级
        function getCabinClassLevel(bookingClass) {
            if (!bookingClass) return null;
            const bc = bookingClass.toUpperCase();
            
            for (const [level, classes] of Object.entries(CABIN_CLASSES)) {
                if (classes.includes(bc)) {

        // ==================== 工具函数 ====================
        function showLoading() {

        function log(message) {
            console.log(`[${new Date().toLocaleTimeString()}] ${message}`);
        }

        // ==================== WebSocket连接管理 ====================
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            try {
                ws = new WebSocket(wsUrl);
                log('🔌 正在连接WebSocket服务器...');

                ws.onopen = function() {
                    log('✅ WebSocket连接成功');
                    wsReconnectAttempts = 0;

                    // 发送心跳
                    setInterval(() => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send('ping');
                        }
                    }, 30000);
                };

                ws.onmessage = function(event) {
                    try {
                        const message = JSON.parse(event.data);
                        log(`📨 收到WebSocket消息: ${message.type}`);

                        switch (message.type) {
                            case 'data_updated':
                                // 数据更新，自动刷新
                                handleDataUpdate(message.data);
                                break;
                            case 'file_changed':
                                // 文件变化，显示通知
                                showNotification('文件已更新，数据正在刷新...');
                                break;
                            case 'pong':
                                // 心跳响应
                                break;
                            default:
                                log(`⚠️ 未知消息类型: ${message.type}`);
                        }
                    } catch (e) {
                        log('❌ 处理WebSocket消息失败: ' + e.message);
                    }
                };

                ws.onerror = function(error) {
                    log('❌ WebSocket错误: ' + error);
                };

                ws.onclose = function() {
                    log('🔌 WebSocket连接已断开');

                    // 尝试重连
                    if (wsReconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        wsReconnectAttempts++;
                        log(`🔄 尝试重新连接 (${wsReconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
                        setTimeout(initWebSocket, RECONNECT_DELAY);
                    } else {
                        log('⚠️ WebSocket重连失败，已达到最大重试次数');
                    }
                };
            } catch (e) {
                log('❌ WebSocket初始化失败: ' + e.message);
            }
        }

        function handleDataUpdate(data) {
            log('📊 数据已更新，正在刷新...');

            // 显示更新通知
            const reason = data.reason || '数据已更新';
            showNotification(reason);

            // 自动刷新数据
            refreshData();
        }

        function showNotification(message) {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #409eff;
                color: white;
                padding: 12px 24px;
                border-radius: 4px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
                z-index: 9999;
                font-size: 14px;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;

            // 添加到页面
            document.body.appendChild(notification);

            // 3秒后自动消失
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

            selectAirline(selectedAirline || '');

        // ==================== API调用 ====================
        // ==================== API 请求封装 ====================
        async function fetchAPI(url, options = {}) {
            // 获取token
            const token = localStorage.getItem('authToken');
            
            // 添加Authorization header
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            const response = await fetch(url, {
                ...options,
                headers
            });
            
            // 检查是否需要重新登录
            if (response.status === 401) {
                // 清除无效的token
                localStorage.removeItem('authToken');
                localStorage.removeItem('rememberedUser');
                // 跳转到登录页面
                window.location.href = '/login';
                return null;
            }
            
            return await response.json();
        }

        // ==================== 登出 ====================
        async function handleLogout() {
            if (confirm('确定要登出吗?')) {
                try {
                    // 调用登出API
                    await fetchAPI(`${API_BASE}/api/logout`, { method: 'POST' });
                } catch (error) {
                    console.error('登出API调用失败:', error);
                } finally {
                    // 清除本地存储
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('rememberedUser');
                    // 跳转到登录页
                    window.location.href = '/login';
                }
            }
        }

        // ==================== 产品类型识别 ====================
        function identifyProductType(product) {
            const productName = (product.product_name || '').toLowerCase();
            if (productName.includes('贵宾室')) return '贵宾室服务';
            if (productName.includes('变更') || productName.includes('改期')) return '变更服务';
            if (productName.includes('伴手礼')) return '伴手礼服务';
            if (productName.includes('专车')) return '专车服务';
            if (productName.includes('门票')) return '门票服务';
            if (productName.includes('经济舱')) return '经济舱产品';
            if (productName.includes('商务舱')) return '商务舱产品';
            if (productName.includes('头等舱')) return '头等舱产品';
            return '常规产品';
        }

        // ==================== 初始化 ====================
        async function initApp() {
            log('🚀 开始初始化应用');
            log(`🌐 服务器地址: ${window.location.origin}${API_BASE}`);
            showLoading();

            try {
                // 检查服务器健康状态
                try {
                    const healthResponse = await fetch(`${API_BASE}/health`, {
                        method: 'GET',
                        cache: 'no-cache'
                    });

                    if (healthResponse.ok) {
                        const healthData = await healthResponse.json();
                        log('✅ 服务器健康检查通过');
                        log(`   状态: ${healthData.status}`);
                        log(`   消息: ${healthData.message}`);
                    } else {
                        log('⚠️ 服务器响应异常: ' + healthResponse.status);
                    }
                } catch (healthError) {
                    log('❌ 无法连接到服务器: ' + healthError.message);
                    log('   请检查服务是否已启动');
                    log('   预期地址: http://localhost:8000');
                }

                initEventListeners();
                await loadAirlines();
                await selectAirline('');

                // 初始化WebSocket连接

                log('❌ 初始化失败: ' + error.message);

                alert('加载失败，请刷新页面重试');
            } finally {

            }
        }

                    }).join('')}
                `;

                const filtered = allAirlines.filter(airline => {
                    const code = airline.code.toLowerCase();
                    const name = (AIRLINE_NAMES[airline.code] || airline.name || '').toLowerCase();
                    const search = searchText.toLowerCase();
                    return code.includes(search) || name.includes(search);
                });

                if (filtered.length === 0) {
                    list.innerHTML = `<li class="el-select-dropdown__empty">无匹配数据</li>`;

        // ==================== 选择航司 ====================
        async function selectAirline(code) {
            log(`✈️ 选择航司: ${code || '全部'}`);
            selectedAirline = code;

            // 更新输入框显示
            const input = document.getElementById('airlineSelectInput');

                    if (airline) {

                if (data.success && data.data.products) {

        // ==================== 筛选产品 ====================
        function filterProducts(products) {
            log(`🔍 筛选产品 (航司: "${selectedAirline}", 票证类型: "${selectedTicketType}", 舱位等级: "${selectedCabinClass}", 产品类型: "${selectedProductType}", Office: "${selectedOffice}")`);
            let filtered = [...products];

            if (selectedAirline) {
                filtered = filtered.filter(p => {
                    return p.airline === selectedAirline;
                });
            }

            if (selectedTicketType) {
                filtered = filtered.filter(p => {
                    if (!p.ticket_type) return false;
                    return p.ticket_type.toUpperCase() === selectedTicketType;
                });
            }

            if (selectedCabinClass) {
                filtered = filtered.filter(p => {
                    if (!p.booking_class) return false;
                    const cabinLevel = getCabinClassLevel(p.booking_class);
                    return cabinLevel === selectedCabinClass;
                });
            }

            if (selectedProductType) {
                filtered = filtered.filter(p => {
                    const productType = identifyProductType(p);
                    return productType === selectedProductType;
                });
            }

            if (selectedOffice) {
                filtered = filtered.filter(p => {
                    const office = p.office || '';
                    return office.includes(selectedOffice);
                });
            }

            log(`✅ 筛选后剩余 ${filtered.length} 个产品`);
            return filtered;
        }

                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">舱位</td>
                                    <td style="padding: 4px 8px; font-size: 11px;"><span style="${cabinClassStyle}">${bookingClass}</span></td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">政策代码</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${policyCode}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">${priceType}</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${priceText}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">政策返点</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${rebate}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">出票Office</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${office}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">票证类型</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${ticketTypeDisplay}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px;">有效期</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${validPeriodDisplay}</td>
                                </tr>
                                <tr>
                                    <td style="padding: 4px 8px; color: #909399; font-size: 10px; vertical-align: top;">备注</td>
                                    <td style="padding: 4px 8px; font-size: 11px;">${remarks}</td>
                                </tr>
                            </table>
                        </div>
                    </td>
                </tr>
            `;
        }

        // ==================== 删除产品 ====================
        async function deleteProduct(productId) {
            if (!confirm('确定要删除这个产品吗?此操作不可恢复!')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/product/${productId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('authToken')}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    alert('删除成功!');
                    // 重新加载产品数据
                    if (selectedAirline) {
                        await selectAirline(selectedAirline);
                    } else {
                        await loadAirlines();
                        await selectAirline('');
                    }
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // ==================== 批量删除产品 ====================
        let selectedProducts = new Set();

        function handleCheckboxChange(checkbox) {
            const productId = checkbox.getAttribute('data-product-id');
            if (checkbox.checked) {
                selectedProducts.add(productId);
            } else {
                selectedProducts.delete(productId);
            }
            updateBatchDeleteButton();
        }

        function toggleProductSelection(productId) {
            if (selectedProducts.has(productId)) {
                selectedProducts.delete(productId);
            } else {
                selectedProducts.add(productId);
            }
            updateBatchDeleteButton();
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.product-checkbox');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);

            checkboxes.forEach(checkbox => {
                checkbox.checked = !allChecked;
                const productId = checkbox.getAttribute('data-product-id');
                if (checkbox.checked) {
                    selectedProducts.add(productId);
                } else {
                    selectedProducts.delete(productId);
                }
            });

            updateBatchDeleteButton();
        }

        function updateBatchDeleteButton() {
            const button = document.getElementById('batchDeleteButton');
            if (button) {
                button.style.display = selectedProducts.size > 0 ? 'block' : 'none';
                button.textContent = `删除选中 (${selectedProducts.size})`;
            }
        }

        async function batchDeleteProducts() {
            if (selectedProducts.size === 0) {
                alert('请至少选择一个产品');
                return;
            }

            if (!confirm(`确定要删除选中的 ${selectedProducts.size} 个产品吗?此操作不可恢复!`)) {
                return;
            }

            let successCount = 0;
            let failCount = 0;

            for (const productId of selectedProducts) {
                try {
                    const response = await fetch(`${API_BASE}/api/product/${productId}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('authToken')}`
                        }
                    });

                    const data = await response.json();
                    if (data.success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    failCount++;
                }
            }

            alert(`批量删除完成!\n成功: ${successCount}\n失败: ${failCount}`);

            // 清空选择
            selectedProducts.clear();
            updateBatchDeleteButton();

            // 重新加载产品数据
            if (selectedAirline) {
                await selectAirline(selectedAirline);
            } else {
                await loadAirlines();
                await selectAirline('');
            }
        }

        // ==================== 编辑产品 ====================
        async function editProduct(productId) {
            // 根据product_id找到产品
            const product = currentProducts.find(p => p.product_id === productId);

            if (!product) {
                alert('找不到产品信息');
                return;
            }

            // 创建编辑表单
            const formHtml = `
                <div id="editModal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999;">
                    <div style="background: white; padding: 30px; border-radius: 8px; max-width: 800px; max-height: 90vh; overflow-y: auto; width: 90%;">
                        <h2 style="margin-bottom: 20px;">编辑产品</h2>
                        <form id="editForm">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">航空公司</label>
                                    <input type="text" id="edit_airline" value="${product.airline}" disabled style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px; background: #f5f7fa;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">产品名称</label>
                                    <input type="text" id="edit_product_name" value="${product.product_name}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">航线</label>
                                    <input type="text" id="edit_route" value="${product.route}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">舱位</label>
                                    <input type="text" id="edit_booking_class" value="${product.booking_class}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">上浮价格</label>
                                    <input type="number" id="edit_price_increase" value="${product.price_increase || 0}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">政策返点</label>
                                    <input type="text" id="edit_rebate_ratio" value="${product.rebate_ratio || ''}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">出票Office</label>
                                    <input type="text" id="edit_office" value="${product.office || ''}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">有效期</label>
                                    <input type="text" id="edit_valid_period" value="${product.valid_period || ''}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">票证类型</label>
                                    <input type="text" id="edit_ticket_type" value="${product.ticket_type || ''}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">政策代码</label>
                                    <input type="text" id="edit_policy_code" value="${product.policy_code || ''}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 5px; font-weight: 600;">产品标识</label>
                                    <input type="text" id="edit_policy_identifier" value="${product.policy_identifier || ''}" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">
                                </div>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 5px; font-weight: 600;">备注</label>
                                <textarea id="edit_remarks" rows="4" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;">${product.remarks || ''}</textarea>
                            </div>
                            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                                <button type="button" onclick="closeEditModal()" style="padding: 10px 20px; border: 1px solid #dcdfe6; background: white; border-radius: 4px; cursor: pointer;">取消</button>
                                <button type="submit" style="padding: 10px 20px; background: #409eff; color: white; border: none; border-radius: 4px; cursor: pointer;">保存</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', formHtml);

            // 处理表单提交
            document.getElementById('editForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                const updateData = {
                    product_name: document.getElementById('edit_product_name').value,
                    route: document.getElementById('edit_route').value,
                    booking_class: document.getElementById('edit_booking_class').value,
                    price_increase: parseFloat(document.getElementById('edit_price_increase').value) || 0,
                    rebate_ratio: document.getElementById('edit_rebate_ratio').value,
                    office: document.getElementById('edit_office').value,
                    valid_period: document.getElementById('edit_valid_period').value,
                    ticket_type: document.getElementById('edit_ticket_type').value,
                    policy_code: document.getElementById('edit_policy_code').value,
                    policy_identifier: document.getElementById('edit_policy_identifier').value,
                    remarks: document.getElementById('edit_remarks').value
                };

                try {
                    const response = await fetch(`${API_BASE}/api/product/${productId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('authToken')}`
                        },
                        body: JSON.stringify(updateData)
                    });

                    const data = await response.json();

                    if (data.success) {
                        alert('更新成功!');
                        closeEditModal();
                        // 重新加载产品数据
                        if (selectedAirline) {
                            await selectAirline(selectedAirline);
                        } else {
                            await loadAirlines();
                            await selectAirline('');
                        }
                    } else {
                        alert('更新失败: ' + data.message);
                    }
                } catch (error) {
                    alert('更新失败: ' + error.message);
                }
            });
        }

        // ==================== 关闭编辑弹窗 ====================
        function closeEditModal() {
            const modal = document.getElementById('editModal');
            if (modal) {
                modal.remove();
            }
        }

        // ==================== 切换展开行 ====================
        function toggleExpand(productId) {
            const expandRow = document.getElementById(`expand-${productId}`);
            const productRow = document.querySelector(`.product-row[data-product-id="${productId}"]`);
            const expandIcon = productRow.querySelector('.el-table__expand-icon');

            if (expandRow.style.display === 'none') {
                expandRow.style.display = 'table-row';
                productRow.classList.add('expanded');
                expandIcon.innerHTML = '▼';
            } else {
                expandRow.style.display = 'none';
                productRow.classList.remove('expanded');
                expandIcon.innerHTML = '▶';
            }
        }

        // ==================== 更新标题 ====================
        function updateTitle(title) {
            const titleElement = document.querySelector('.content-title');
            if (titleElement) {
                titleElement.textContent = title;
            }
        }

        // ==================== 初始化事件监听 ====================
        function initEventListeners() {
            // 航司选择 - 输入框点击
            const airlineSelectWrapper = document.getElementById('airlineSelectWrapper');
            const airlineSelectInput = document.getElementById('airlineSelectInput');
            const airlineSearchInput = document.getElementById('airlineSearchInput');

            if (airlineSelectWrapper && airlineSelectInput && airlineSearchInput) {
                airlineSelectInput.addEventListener('click', toggleAirlineDropdown);

                // 航司搜索
                airlineSearchInput.addEventListener('input', function(e) {
                    updateAirlineDropdown(e.target.value);
                });

                // 点击外部关闭下拉框
                document.addEventListener('click', function(e) {
                    if (!airlineSelectWrapper.contains(e.target)) {
                        closeAirlineDropdown();
                    }
                });
            }

            // 票证类型筛选
            const ticketTypeSelect = document.getElementById('ticketTypeSelect');
            if (ticketTypeSelect) {
                ticketTypeSelect.addEventListener('change', function(e) {
                    selectedTicketType = e.target.value;
                    log(`选择票证类型: "${selectedTicketType || '全部'}"`);
                    if (currentProducts.length > 0) {
                        const filtered = filterProducts(currentProducts);
                        renderProducts(filtered);
                    }
                });
            }

            // 舱位等级筛选
            const cabinClassSelect = document.getElementById('cabinClassSelect');
            if (cabinClassSelect) {
                cabinClassSelect.addEventListener('change', function(e) {
                    selectedCabinClass = e.target.value;
                    log(`选择舱位等级: "${selectedCabinClass || '全部'}"`);
                    if (currentProducts.length > 0) {
                        const filtered = filterProducts(currentProducts);
                        renderProducts(filtered);
                    }
                });
            }

            // 产品类型筛选
            const productTypeSelect = document.getElementById('productTypeSelect');
            if (productTypeSelect) {
                productTypeSelect.addEventListener('change', function(e) {
                    selectedProductType = e.target.value;
                    log(`选择产品类型: "${selectedProductType || '全部'}"`);
                    if (currentProducts.length > 0) {
                        const filtered = filterProducts(currentProducts);
                        renderProducts(filtered);
                    }
                });
            }

            // Office号筛选
            const officeSelect = document.getElementById('officeSelect');
            if (officeSelect) {
                officeSelect.addEventListener('change', function(e) {
                    selectedOffice = e.target.value;
                    log(`选择Office号: "${selectedOffice || '全部'}"`);
                    if (currentProducts.length > 0) {
                        const filtered = filterProducts(currentProducts);
                        renderProducts(filtered);
                    }
                });
            }

            log('✅ 事件监听器初始化完成');
        }

        window.addEventListener('DOMContentLoaded', function() {
            log('📄 页面加载完成');
            initApp();
        });
    </script>
</body>
</html>
