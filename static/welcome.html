<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用航空公司产品智能体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #1e293b;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn.secondary {
            background: #64748b;
        }
        .features {
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 10px;
        }
        .feature {
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .feature:last-child {
            border-bottom: none;
        }
        .feature-icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✈️</div>
        <h1>航空公司产品智能体</h1>
        <p>欢迎使用航空公司产品智能体系统！<br>一个简洁高效的产品查询工具。</p>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">🔍</span>
                <strong>智能搜索</strong> - 快速查找航空公司产品
            </div>
            <div class="feature">
                <span class="feature-icon">📊</span>
                <strong>数据统计</strong> - 实时查看产品统计数据
            </div>
            <div class="feature">
                <span class="feature-icon">🏢</span>
                <strong>航司管理</strong> - 支持30家航空公司
            </div>
            <div class="feature">
                <span class="feature-icon">📱</span>
                <strong>多端访问</strong> - 支持Web、API多种访问方式
            </div>
        </div>
        
        <a href="/" class="btn">开始使用</a>
        <a href="/docs" class="btn secondary">查看API文档</a>
    </div>
</body>
</html>
